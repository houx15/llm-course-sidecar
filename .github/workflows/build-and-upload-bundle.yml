name: Build & Upload Sidecar Bundle

on:
  push:
    branches: [dev]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'scripts/build_sidecar_code_bundle.py'
    tags: ['v*']

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to count total commits for version suffix

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine environment
        id: env
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "Trigger: tag ${GITHUB_REF_NAME} → prod"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "Trigger: branch ${GITHUB_REF_NAME} → dev"
          fi

      - name: Compute version
        id: version
        run: |
          ENV="${{ steps.env.outputs.environment }}"

          if [[ "$ENV" == "prod" ]]; then
            # For tags, use the tag as version (strip leading 'v')
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # For dev, use pyproject.toml base version + commit count
            BASE_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
            COMMIT_COUNT=$(git rev-list --count HEAD)
            VERSION="${BASE_VERSION}-dev.${COMMIT_COUNT}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Build bundle
        run: |
          python scripts/build_sidecar_code_bundle.py \
            --version "${{ steps.version.outputs.version }}" \
            --scope-id core \
            --output /tmp/

      - name: Upload bundle to backend
        run: |
          ENV="${{ steps.env.outputs.environment }}"

          if [[ "$ENV" == "dev" ]]; then
            BACKEND_URL="${{ secrets.SIDECAR_BACKEND_URL_DEV }}"
            ADMIN_KEY="${{ secrets.SIDECAR_ADMIN_KEY_DEV }}"
          else
            BACKEND_URL="${{ secrets.SIDECAR_BACKEND_URL }}"
            ADMIN_KEY="${{ secrets.SIDECAR_ADMIN_KEY }}"
          fi

          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_FILE="/tmp/sidecar_code_${VERSION}.tar.gz"

          echo "Uploading ${BUNDLE_FILE} to ${BACKEND_URL} (${ENV}) ..."

          HTTP_STATUS=$(curl -s -o /tmp/upload_response.json -w "%{http_code}" \
            -X POST "${BACKEND_URL}/v1/admin/bundles/upload" \
            -H "X-Admin-Key: ${ADMIN_KEY}" \
            -F "file=@${BUNDLE_FILE};type=application/gzip" \
            -F "bundle_type=python_runtime" \
            -F "scope_id=core" \
            -F "version=${VERSION}" \
            -F "is_mandatory=true" \
            -F 'manifest_json={}')

          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/upload_response.json

          if [ "${HTTP_STATUS}" != "201" ]; then
            echo "Upload failed with HTTP ${HTTP_STATUS}" >&2
            exit 1
          fi

          echo "Upload successful!"
